name: Build and Release fmanYS

on:
  push:
    branches: [main]
    tags:
      - 'v[0-9]*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "setuptools<72"
          pip install PyQt5==5.15.11
          pip install PyInstaller==6.19.0
          pip install tinycss==0.4 rsa==3.4.2 requests==2.25.1
          pip install send2trash pywinpty pywin32
          pip install adodbapi --no-build-isolation
          pip install "fbs[sentry] @ http://build-system.fman.io/pro/b5aab865-bd29-4f23-992c-0eb4f3a24f33/0.9.4"
        shell: cmd

      - name: Get version and timestamp
        id: version
        shell: python
        run: |
          import json, os
          from datetime import datetime, timezone

          with open('src/build/settings/base.json') as f:
              ver = json.load(f)['version']

          dt = datetime.now(timezone.utc).strftime('%y%m%d-%H%M')
          ref = os.environ.get('GITHUB_REF', '')
          run_num = os.environ.get('GITHUB_RUN_NUMBER', '0')

          is_tag = ref.startswith('refs/tags/')
          tag_name = ref.split('/')[-1] if is_tag else f'v{ver}-build.{run_num}'
          build_ver = f'v{ver}-{dt}' if is_tag else f'v{ver}-{dt}-build.{run_num}'

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'VERSION={ver}\n')
              f.write(f'BUILD_VER={build_ver}\n')
              f.write(f'TAG_NAME={tag_name}\n')
              f.write(f'IS_TAG={"true" if is_tag else "false"}\n')

      - name: Write build tag into resources
        shell: cmd
        run: echo ${{ steps.version.outputs.BUILD_VER }}> src\main\resources\base\build_tag.txt

      - name: Patch fbs to skip msvcr100.dll check
        run: python patch_fbs_freeze.py
        shell: cmd

      - name: Install NSIS
        run: choco install nsis --no-progress -y
        shell: cmd

      - name: Build frozen directory
        run: python build.py freeze
        shell: cmd

      - name: Build installer exe
        run: python build.py installer
        continue-on-error: true
        shell: cmd

      - name: Build portable exe
        run: python build_portable.py
        shell: cmd

      - name: List artifacts
        run: dir target\PyInstaller\fmanYS-portable\ /b
        shell: cmd
        continue-on-error: true

      # Tag push → stable release (exe attached, prerelease=false)
      - name: Upload stable release
        if: steps.version.outputs.IS_TAG == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG_NAME }}
          name: fmanYS ${{ steps.version.outputs.TAG_NAME }}
          body: |
            Build: `${{ steps.version.outputs.BUILD_VER }}`
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
          files: |
            target/PyInstaller/fmanYS-portable/fmanYS-portable.exe
            target/fmanYS Setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # main push (no tag) → pre-release only
      - name: Upload pre-release
        if: steps.version.outputs.IS_TAG == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG_NAME }}
          name: fmanYS ${{ steps.version.outputs.BUILD_VER }}
          draft: false
          prerelease: true
          fail_on_unmatched_files: false
          files: |
            target/PyInstaller/fmanYS-portable/fmanYS-portable.exe
            target/fmanYS Setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
